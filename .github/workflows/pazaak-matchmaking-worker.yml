name: Deploy Pazaak Matchmaking Worker

on:
  push:
    branches:
      - main
    paths:
      - "infra/pazaak-matchmaking-worker/**"
      - ".github/workflows/pazaak-matchmaking-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pazaak-matchmaking-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@4.38.0 deploy --config infra/pazaak-matchmaking-worker/wrangler.toml
